<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ranking de Vendas</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    margin: 0;
}

/* Remove setinhas */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
}

.top-input {
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
}

.valor-input {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 10px;
    margin-top: 10px;
    width: 140px;
    text-align: center;
    color: #22c55e;
    font-weight: bold;
    font-size: 16px;
    outline: none;
    transition: 0.2s;
}

.valor-input:focus {
    border-color: #22c55e;
    box-shadow: 0 0 10px rgba(34,197,94,0.4);
}

.nome-input {
    background: none;
    border: none;
    color: white;
    font-weight: 600;
    text-align: center;
    width: 100%;
    font-size: 16px;
}
.nome-input:focus {
    outline: none;
    border-bottom: 1px solid #475569;
}

.loja-badge {
    background: #334155;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 6px;
    display: inline-block;
    opacity: 0.8;
}

.card {
    margin: 10px;
    padding: 20px;
    background: #1e293b;
    border-radius: 16px;
    position: relative;
}

.botao-remover {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: #475569;
    font-size: 14px;
    cursor: pointer;
}

.botao-remover:hover {
    color: #ef4444;
}

@keyframes girarMoeda {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

.campeao-card {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
    border: 1px solid rgba(255, 215, 0, 0.2);
}

.foto-campeao {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: 15px auto;
    display: block;
    animation: girarMoeda 8s linear infinite;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
}

#overlayCampeao {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.overlay-foto {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    margin: 20px;
    animation: girarMoeda 6s linear infinite;
    box-shadow: 0 0 30px rgba(255,215,0,0.4);
}
</style>
</head>

<body>

<h1>🏆 Ranking de Vendas</h1>

<div style="margin-top:30px;">
    <input type="text" id="nome" placeholder="Novo vendedor" class="top-input">
    <input type="text" id="loja" placeholder="Loja" class="top-input">
    <input type="file" id="foto">
    <button onclick="adicionarVendedor()">Criar Vendedor</button>
</div>

<div style="margin-top:50px; display:flex; justify-content:center; gap:60px;">
    <div style="width:250px;">
        <h2>🥇 1º Lugar</h2>
        <div id="primeiro">---</div>
    </div>

    <div style="width:200px;">
        <h2>🥈 2º Lugar</h2>
        <div id="segundo">---</div>
    </div>

    <div style="width:200px;">
        <h2>🥉 3º Lugar</h2>
        <div id="terceiro">---</div>
    </div>
</div>

<h2 style="margin-top:60px;">📋 Todos os vendedores</h2>
<div id="lista" style="max-width:600px; margin:auto;"></div>

<div id="overlayCampeao">
    <h1 style="font-size:40px;">👑 Campeão de Vendas 👑</h1>
    <div id="overlayConteudo"></div>
</div>

<script>

let vendedores = [];
let ultimoPrimeiro = null;

let dadosSalvos = localStorage.getItem("ranking");
if (dadosSalvos) vendedores = JSON.parse(dadosSalvos);

function adicionarVendedor() {

    let nome = document.getElementById("nome").value.trim();
    let loja = document.getElementById("loja").value.trim();
    let fotoInput = document.getElementById("foto");

    if(nome === "" || loja === "") return alert("Preencha nome e loja");

    let existente = vendedores.find(v => v.nome.toLowerCase() === nome.toLowerCase());
    if (existente) return alert("Vendedor já existe.");

    if (fotoInput.files[0]) {
        let reader = new FileReader();
        reader.onload = e => {
            vendedores.push({nome, loja, valor:0, foto:e.target.result});
            atualizarRanking();
        };
        reader.readAsDataURL(fotoInput.files[0]);
    } else {
        vendedores.push({nome, loja, valor:0, foto:""});
        atualizarRanking();
    }

    document.getElementById("nome").value = "";
    document.getElementById("loja").value = "";
    document.getElementById("foto").value = "";
}

function editarNome(i, novoNome){
    if(novoNome.trim()==="") return;
    vendedores[i].nome = novoNome.trim();
    atualizarRanking();
}

function editarValor(i, novoValor){
    let valor = parseFloat(novoValor);
    if(isNaN(valor)) return;
    vendedores[i].valor = valor;
    atualizarRanking();
}

function atualizarRanking() {

    vendedores.sort((a,b)=>b.valor-a.valor);

    if (vendedores[0] && vendedores[0].nome !== ultimoPrimeiro) {
        mostrarCampeao(vendedores[0]);
        ultimoPrimeiro = vendedores[0].nome;
    }

    document.getElementById("primeiro").innerHTML =
        vendedores[0] ? `
        <div class="campeao-card">
            ${vendedores[0].foto ? `<img src="${vendedores[0].foto}" class="foto-campeao">` : ""}
            <div style="font-weight:600;">${vendedores[0].nome}</div>
            <div class="loja-badge">${vendedores[0].loja}</div>
            <div style="opacity:0.7;">
                ${vendedores[0].valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
            </div>
        </div>` : "---";

    document.getElementById("segundo").innerHTML =
        vendedores[1] ? vendedores[1].nome : "---";

    document.getElementById("terceiro").innerHTML =
        vendedores[2] ? vendedores[2].nome : "---";

    let listaHTML="";
    vendedores.forEach((v,i)=>{
        listaHTML+=`
        <div class="card">
            <button class="botao-remover" onclick="removerVendedor(${i})">-</button>

            <input type="text" class="nome-input" value="${v.nome}"
                onkeydown="if(event.key==='Enter'){editarNome(${i}, this.value)}">

            <div class="loja-badge">${v.loja}</div>

            <input type="number" class="valor-input" value="${v.valor}"
                onkeydown="if(event.key==='Enter'){editarValor(${i}, this.value)}">
        </div>`;
    });

    document.getElementById("lista").innerHTML=listaHTML;

    localStorage.setItem("ranking", JSON.stringify(vendedores));
}

function removerVendedor(i){
    if(confirm("Remover vendedor?")){
        vendedores.splice(i,1);
        atualizarRanking();
    }
}

function mostrarCampeao(vendedor){

    let overlay = document.getElementById("overlayCampeao");
    let conteudo = document.getElementById("overlayConteudo");

    conteudo.innerHTML = `
        ${vendedor.foto ? `<img src="${vendedor.foto}" class="overlay-foto">` : ""}
        <h2>${vendedor.nome}</h2>
        <div class="loja-badge">${vendedor.loja}</div>
        <p>${vendedor.valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}</p>
    `;

    overlay.style.display="flex";

    setTimeout(()=>{
        overlay.style.display="none";
    },4000);
}

atualizarRanking();

</script>

</body>
</html>
