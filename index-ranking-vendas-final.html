<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ranking de Vendas</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    margin: 0;
}

.card {
    margin: 10px;
    padding: 15px;
    background: #1e293b;
    border-radius: 12px;
    position: relative;
}

.botao-remover {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
}

#overlayCampeao {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}
</style>
</head>

<body>

<h1>🏆 Ranking de Vendas</h1>
<p style="opacity:0.6;">Boas vendas a todos...</p>

<div style="margin-top:30px;">
    <input type="text" id="nome" placeholder="Nome do vendedor">
    <input type="number" id="valor" placeholder="Valor vendido">
    <button onclick="adicionarVendedor()">Adicionar</button>
</div>

<div style="margin-top:50px;">
    <h2>📋 Ranking</h2>
    <div id="lista" style="max-width:600px; margin:auto;"></div>
</div>

<div id="overlayCampeao">
    <h1>👑 Campeão de Vendas 👑</h1>
    <div id="overlayConteudo"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD_ByAaiCFneKbXA3gIwiv3J2ArlYDdqVA",
  authDomain: "ranking-de-vendas-4fce9.firebaseapp.com",
  projectId: "ranking-de-vendas-4fce9",
  storageBucket: "ranking-de-vendas-4fce9.firebasestorage.app",
  messagingSenderId: "1092706550419",
  appId: "1:1092706550419:web:f9f0837d01c256e3cfc366"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const colecao = db.collection("vendedores");

let vendedores = [];
let ultimoPrimeiro = null;

colecao.orderBy("valor","desc").onSnapshot(snapshot=>{
    vendedores = [];
    snapshot.forEach(doc=>{
        vendedores.push({...doc.data(), id:doc.id});
    });
    atualizarRanking();
});

function adicionarVendedor(){
    let nome = document.getElementById("nome").value;
    let valor = parseFloat(document.getElementById("valor").value);

    if(!nome || isNaN(valor)) return alert("Preencha corretamente");

    colecao.add({
        nome: nome,
        valor: valor
    });

    document.getElementById("nome").value="";
    document.getElementById("valor").value="";
}

function removerVendedor(id){
    if(confirm("Remover vendedor?")){
        colecao.doc(id).delete();
    }
}

function atualizarRanking(){

    if(vendedores[0] && vendedores[0].nome !== ultimoPrimeiro){
        mostrarCampeao(vendedores[0]);
        ultimoPrimeiro = vendedores[0].nome;
    }

    let html="";
    vendedores.forEach((v,i)=>{
        html+=`
        <div class="card">
            <button class="botao-remover" onclick="removerVendedor('${v.id}')">X</button>
            <strong>${i+1}º - ${v.nome}</strong><br>
            ${v.valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
}

function mostrarCampeao(v){
    let overlay=document.getElementById("overlayCampeao");
    let conteudo=document.getElementById("overlayConteudo");

    conteudo.innerHTML=`
        <h2>${v.nome}</h2>
        <p>${v.valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}</p>
    `;

    overlay.style.display="flex";

    setTimeout(()=>{
        overlay.style.display="none";
    },3000);
}

</script>

</body>
</html>
